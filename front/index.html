<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOrbit AI — Agente Inteligente</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.6rem; color: #38bdf8; font-weight: 700; }
        header span { font-size: 0.8rem; color: #64748b; }
        .container { display: flex; flex: 1; max-height: calc(100vh - 60px); }
        .sidebar { width: 300px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 1rem; gap: 1rem; overflow-y: auto; }
        .sidebar h3 { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .upload-area { border: 2px dashed #334155; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: #38bdf8; }
        .upload-area input { display: none; }
        .upload-area p { font-size: 0.85rem; color: #64748b; }
        .doc-list { display: flex; flex-direction: column; gap: 0.25rem; }
        .doc-item { padding: 0.5rem 0.75rem; background: #0f172a; border-radius: 6px; font-size: 0.85rem; color: #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .doc-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .msg.user { align-self: flex-end; background: #0ea5e9; color: white; border-bottom-right-radius: 4px; }
        .msg.bot { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; }
        .msg.bot .sources { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #334155; font-size: 0.75rem; color: #64748b; }
        .msg.error { align-self: center; background: #7f1d1d; color: #fca5a5; font-size: 0.85rem; }
        .msg.system { align-self: center; background: transparent; color: #64748b; font-size: 0.85rem; text-align: center; }
        .typing { align-self: flex-start; background: #1e293b; padding: 0.75rem 1rem; border-radius: 12px; }
        .typing span { display: inline-block; width: 8px; height: 8px; background: #64748b; border-radius: 50%; animation: bounce 1.4s infinite; margin: 0 2px; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        .input-area { padding: 1rem 1.5rem; background: #1e293b; border-top: 1px solid #334155; }
        .input-area form { display: flex; gap: 0.5rem; }
        .input-area input { flex: 1; padding: 0.75rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; outline: none; }
        .input-area input:focus { border-color: #38bdf8; }
        .input-area button { padding: 0.75rem 1.5rem; background: #0ea5e9; color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
        .input-area button:hover { background: #0284c7; }
        .input-area button:disabled { background: #334155; cursor: not-allowed; }
        #uploadStatus { font-size: 0.8rem; color: #22c55e; margin-top: 0.5rem; }
        .config { font-size: 0.8rem; color: #64748b; }
        .config input { width: 100%; padding: 0.4rem; background: #0f172a; border: 1px solid #334155; border-radius: 4px; color: #e2e8f0; font-size: 0.8rem; margin-top: 0.25rem; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: 200px; flex-direction: row; flex-wrap: wrap; }
            .msg { max-width: 95%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌾 AgroOrbit AI</h1>
        <span>RAG + LLM Local | FIAP Global Solution</span>
    </header>
    <div class="container">
        <aside class="sidebar">
            <div>
                <h3>📄 Upload de Documentos</h3>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".txt,.pdf">
                    <p>Clique ou arraste um arquivo<br>(PDF ou TXT)</p>
                </div>
                <div id="uploadStatus"></div>
            </div>
            <div>
                <h3>📚 Documentos</h3>
                <div class="doc-list" id="docList"><p style="font-size:0.8rem;color:#64748b">Carregando...</p></div>
            </div>
            <div class="config">
                <h3>⚙️ API URL</h3>
                <input type="text" id="apiUrl" value="http://54.225.1.149:8000" placeholder="http://IP_DA_EC2:8000">
                <p style="margin-top:0.25rem">Altere para o IP da sua EC2</p>
            </div>
        </aside>
        <main class="main-chat">
            <div class="messages" id="messages">
                <div class="msg system">Envie um documento e faça perguntas sobre ele. O agente usa IA local para responder.</div>
            </div>
            <div class="input-area">
                <form id="chatForm">
                    <input type="text" id="questionInput" placeholder="Faça uma pergunta sobre seus documentos..." autocomplete="off">
                    <button type="submit" id="sendBtn">Enviar</button>
                </form>
            </div>
        </main>
    </div>
    <script>
    const $ = id => document.getElementById(id);
    const getApi = () => $('apiUrl').value.replace(/\/+$/, '');

    // --- Upload ---
    $('uploadArea').addEventListener('click', () => $('fileInput').click());
    $('uploadArea').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.style.borderColor = '#38bdf8'; });
    $('uploadArea').addEventListener('dragleave', e => { e.currentTarget.style.borderColor = '#334155'; });
    $('uploadArea').addEventListener('drop', e => {
        e.preventDefault();
        e.currentTarget.style.borderColor = '#334155';
        if (e.dataTransfer.files.length) { $('fileInput').files = e.dataTransfer.files; uploadFile(); }
    });
    $('fileInput').addEventListener('change', uploadFile);

    async function uploadFile() {
        const file = $('fileInput').files[0];
        if (!file) return;
        $('uploadStatus').textContent = 'Enviando...';
        const fd = new FormData();
        fd.append('file', file);
        try {
            const r = await fetch(`${getApi()}/upload`, { method: 'POST', body: fd });
            const d = await r.json();
            $('uploadStatus').textContent = d.message || d.error;
            loadDocs();
        } catch (e) { $('uploadStatus').textContent = 'Erro ao enviar.'; }
    }

    // --- Documentos ---
    async function loadDocs() {
        try {
            const r = await fetch(`${getApi()}/documents`);
            const d = await r.json();
            const docs = d.documents || [];
            $('docList').innerHTML = docs.length
                ? docs.map(doc => `<div class="doc-item"><span class="name">${doc.filename}</span></div>`).join('')
                : '<p style="font-size:0.8rem;color:#64748b">Nenhum documento.</p>';
        } catch (e) { $('docList').innerHTML = '<p style="font-size:0.8rem;color:#ef4444">Erro ao conectar na API.</p>'; }
    }
    loadDocs();

    // --- Chat ---
    function addMsg(text, cls) {
        const div = document.createElement('div');
        div.className = `msg ${cls}`;
        div.innerHTML = text;
        $('messages').appendChild(div);
        $('messages').scrollTop = $('messages').scrollHeight;
        return div;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typingIndicator';
        div.innerHTML = '<span></span><span></span><span></span>';
        $('messages').appendChild(div);
        $('messages').scrollTop = $('messages').scrollHeight;
    }

    function hideTyping() {
        const el = $('typingIndicator');
        if (el) el.remove();
    }

    $('chatForm').addEventListener('submit', async e => {
        e.preventDefault();
        const q = $('questionInput').value.trim();
        if (!q) return;
        addMsg(q, 'user');
        $('questionInput').value = '';
        $('sendBtn').disabled = true;
        showTyping();

        try {
            const r = await fetch(`${getApi()}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q })
            });
            const d = await r.json();
            hideTyping();
            if (d.error) {
                addMsg(d.error, 'error');
            } else {
                let html = d.answer || 'Sem resposta.';
                if (d.sources && d.sources.length > 0) {
                    html += `<div class="sources">📎 Fontes: ${d.sources.map(s => s.filename).filter((v,i,a) => a.indexOf(v)===i).join(', ')}</div>`;
                }
                addMsg(html, 'bot');
            }
        } catch (e) {
            hideTyping();
            addMsg('Erro ao conectar na API. Verifique a URL.', 'error');
        }
        $('sendBtn').disabled = false;
        $('questionInput').focus();
    });
    </script>
</body>
</html>
